<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivilSense AI - Real-Time SHM</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Background Animated Glow -->
    <div class="bg-glow"></div>

    <!-- UI Overlay (Glassmorphism) -->
    <main class="ui-layer">
      
      <!-- Top Bar -->
      <header class="top-bar glass">
        <div class="logo">
          <div class="pulse-dot"></div>
          <h1>CIVILSENSE <span>AI</span></h1>
        </div>
        <div class="status-indicator">
          <button id="btnLangToggle" class="btn-small">EN / ID</button>
          <span class="status-text" id="txtStatus">INITIALIZING...</span>
          <span class="battery">100%</span>
        </div>
      </header>

      <!-- Main Dashboard Grid -->
      <div class="dashboard-grid">
        
        <!-- Left Panel: Acoustic Emission (Audio) -->
        <div class="panel glass left-panel">
          <h2><i class="icon-audio"></i> <span id="txtAcousticTitle">Acoustic Emission Analysis</span></h2>
          <p class="subtitle" id="txtAcousticSub">Microscopic Void Detection via Sound Resonance</p>
          
          <div class="audio-visualizer-container">
            <canvas id="audioVisualizer"></canvas>
            <div class="frequency-stats">
              <div class="stat"><span class="label" id="txtFreq">Freq:</span> <span id="valFreq">0 Hz</span></div>
              <div class="stat"><span class="label" id="txtAmp">Amp:</span> <span id="valAmp">0 dB</span></div>
            </div>
          </div>
          
          <button id="btnStartAudio" class="btn primary-btn">
            <span class="btn-glow"></span>
            <span id="txtBtnAudio">Start Audio Scan</span>
          </button>
        </div>

        <!-- Right Panel: Computer Vision (Crack Depth) -->
        <div class="panel glass right-panel">
          <h2><i class="icon-camera"></i> <span id="txtVisionTitle">Vision Crack Estimator</span></h2>
          <p class="subtitle" id="txtVisionSub">3D Texture Depth Mapping</p>
          
          <div class="vision-preview">
            <div class="scan-frame" id="cameraScanFrame">
              <video id="cameraFeed" autoplay playsinline muted></video>
              <div id="ar-overlay" class="ar-overlay hidden">
                <div class="heatmap-scan"></div>
              </div>
              <div class="scan-line"></div>
              <div class="corner top-left"></div>
              <div class="corner top-right"></div>
              <div class="corner bottom-left"></div>
              <div class="corner bottom-right"></div>
            </div>
            <div class="analysis-results">
              <div class="result-item">
                <span class="label" id="txtDepth">Crack Depth:</span>
                <span class="value default" id="valDepth">--</span>
              </div>
              <div class="result-item">
                <span class="label" id="txtWidth">Width:</span>
                <span class="value default" id="valWidth">--</span>
              </div>
            </div>
          </div>

          <button id="btnScan" class="btn secondary-btn">
            <span id="txtBtnScan">Analyze Current Frame</span>
          </button>
        </div>
      </div>

      <!-- Bottom Panel: AR Stress Map -->
      <footer class="bottom-panel glass">
        <div class="ar-control">
          <h3 id="txtTargetStatus">Target Surface Condition</h3>
          <div class="status-badge standby" id="overallStatus">STANDBY</div>
        </div>
        <div class="footer-actions">
          <button id="btnExport" class="btn secondary-btn" style="margin-right: 1rem;"><span id="txtBtnExport">Export Doc Report</span></button>
          <button id="btnToggleAR" class="btn ar-btn"><span id="txtBtnAR">Toggle AR Heatmap</span></button>
        </div>
      </footer>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
